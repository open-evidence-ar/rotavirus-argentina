name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Setup Python (for scripts/validate_calculations.py)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate numeric calculations
        run: python scripts/validate_calculations.py --verbose
        # Block deploy if any numeric claim in sections/*.md is not reproduced
        # within tolerance. Exit code 1 = mismatch, 2 = missing reference.
        # within tolerance. Exit code 1 = mismatch, 2 = missing reference.
        # Re-run with --json for machine-readable report (evidence/calculations-report.json).
      - name: Check sources accessibility (best-effort)
        run: python scripts/check_sources.py --timeout 8 || true
        # Best-effort: dead URLs are reported but do NOT block deploy.
        # Re-run with --json for evidence/sources-report.json.
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Generate integrity
        run: sha256sum _site/index.html > _site/integrity.txt
      - name: Sign build
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" > /tmp/gpg-key.asc
          gpg --batch --import /tmp/gpg-key.asc
          rm -f /tmp/gpg-key.asc
          gpg --batch --yes --armor --detach-sign --default-key "Rotavirus Argentina Evidence" _site/index.html
          mv _site/index.html.asc _site/signature
          echo "=== Signature generated ==="
          head -2 _site/signature
      - name: Generate archive
        run: |
          cd _site
          test -f public.pem || { echo "Missing public.pem"; exit 1; }
          cp llms.txt rotavirus-argentina.md 2>/dev/null || true
          zip -r ../archive.zip rotavirus-argentina.md integrity.txt signature public.pem 2>/dev/null || zip -r ../archive.zip integrity.txt signature public.pem
          mv ../archive.zip .
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
